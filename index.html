<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Contracts Repository — Current State</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f0f2f7;
    --surface:   #ffffff;
    --surface2:  #f7f8fc;
    --border:    #e2e6f0;
    --border2:   #cdd3e2;
    --accent:    #c8102e;
    --accent-lt: #fdf0f2;
    --teal:      #0d7c6e;
    --teal-lt:   #e8f5f3;
    --blue:      #1a5fa8;
    --blue-lt:   #eaf2fc;
    --purple:    #5b21b6;
    --purple-lt: #f3f0fd;
    --amber:     #a05c00;
    --amber-lt:  #fff8ed;
    --green:     #0d7c4a;
    --green-lt:  #edfaf3;
    --text:      #1a1e2e;
    --text-2:    #4a5568;
    --text-3:    #8a94a8;
    --text-4:    #b8c0d0;
    --shadow:    0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;font-size:13px;}

  /* ── HEADER ── */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;height:60px;box-shadow:var(--shadow);}
  .hd-left{display:flex;align-items:center;gap:14px;}
  .logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;letter-spacing:-0.5px;}
  .hd-title{font-weight:700;font-size:15px;color:var(--text);line-height:1.15;}
  .hd-sub{font-size:10.5px;color:var(--text-3);font-weight:400;margin-top:1px;}
  .hd-right{display:flex;align-items:center;gap:12px;}
  .hd-badge{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:10px;color:var(--text-3);font-weight:500;letter-spacing:0.04em;}
  .hd-stat{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3);}
  .hd-stat-num{font-weight:700;color:var(--accent);font-size:14px;}

  /* ── TOOLBAR ── */
  .toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:220px;max-width:340px;}
  .search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:7px 12px 7px 32px;outline:none;transition:border-color .2s,box-shadow .2s;}
  .search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,168,.1);}
  .search-wrap input::placeholder{color:var(--text-4);}
  .search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-4);font-size:13px;pointer-events:none;}
  .filter-sel{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text-2);font-family:'Inter',sans-serif;font-size:11px;padding:7px 10px;outline:none;cursor:pointer;transition:border-color .2s;}
  .filter-sel:focus{border-color:var(--blue);}
  .tb-divider{width:1px;height:24px;background:var(--border);margin:0 4px;}
  .tb-count{font-size:11px;color:var(--text-3);margin-left:auto;white-space:nowrap;}
  .tb-count strong{color:var(--text);font-weight:600;}

  /* ── LAYOUT ── */
  .body-wrap{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 105px);overflow:hidden;}

  /* ── SIDEBAR ── */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:10px 8px;}
  .sidebar::-webkit-scrollbar{width:4px;}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

  .contract-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:5px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
  .contract-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border2);transition:background .15s;}
  .contract-card:hover{background:#eef1f9;border-color:var(--border2);}
  .contract-card.active{background:var(--blue-lt);border-color:#90b8e8;}
  .contract-card.active::before{background:var(--blue);}
  .cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
  .cc-id{font-size:9px;color:var(--text-4);font-weight:600;letter-spacing:.05em;font-family:'JetBrains Mono',monospace;flex-shrink:0;padding-top:2px;}
  .cc-name{font-weight:600;font-size:12px;color:var(--text);line-height:1.3;flex:1;}
  .cc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
  .cc-freq{font-size:9.5px;color:var(--text-3);margin-top:4px;display:flex;align-items:center;gap:4px;}
  .cc-freq::before{content:'↻';font-size:10px;}

  /* ── TAGS ── */
  .tag{display:inline-flex;align-items:center;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border:1px solid transparent;white-space:nowrap;}
  .tag-activity   {background:#fff0e8;color:#b03a00;border-color:#ffd4b8;}
  .tag-master     {background:var(--blue-lt);color:var(--blue);border-color:#c0d8f4;}
  .tag-output     {background:var(--purple-lt);color:var(--purple);border-color:#d4c8f8;}
  .tag-field      {background:#f0fdf4;color:#166534;border-color:#bbf7d0;}
  .tag-hq         {background:var(--teal-lt);color:var(--teal);border-color:#a7dfda;}
  .tag-access     {background:var(--amber-lt);color:var(--amber);border-color:#fcd99a;}
  .tag-edb        {background:#fdf4ff;color:#7e22ce;border-color:#e9d5ff;}
  .tag-default    {background:var(--surface2);color:var(--text-3);border-color:var(--border);}
  .tag-active     {background:var(--green-lt);color:var(--green);border-color:#a7f3c8;}

  /* ── DETAIL PANEL ── */
  .detail{background:var(--bg);overflow-y:auto;padding:28px 32px;}
  .detail::-webkit-scrollbar{width:4px;}
  .detail::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text-4);text-align:center;}
  .detail-empty .ei{font-size:52px;opacity:.35;margin-bottom:4px;}
  .detail-empty p{font-size:12px;color:var(--text-3);}

  .detail-inner{max-width:860px;}

  /* Breadcrumb */
  .bc{font-size:10px;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .bc-sep{color:var(--text-4);}

  /* Title block */
  .dt-title{font-weight:700;font-size:24px;color:var(--text);line-height:1.2;margin-bottom:8px;}
  .dt-desc{font-size:12.5px;color:var(--text-2);line-height:1.65;margin-bottom:14px;}
  .dt-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}

  /* Meta cards */
  .meta-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
  .meta-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:13px 15px;box-shadow:var(--shadow);}
  .mc-label{font-size:9.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:600;}
  .mc-value{font-size:12px;color:var(--text);font-weight:500;line-height:1.4;word-break:break-word;}

  /* Section headers */
  .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:24px;}
  .sec-title{font-weight:700;font-size:11.5px;color:var(--text);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px;}
  .sec-title::before{content:'';display:inline-block;width:3px;height:13px;background:var(--accent);border-radius:2px;}
  .sec-pill{font-size:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-3);padding:2px 9px;border-radius:10px;font-weight:500;}

  /* Schema table */
  .schema-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:24px;}
  .schema-tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
  .schema-tbl thead tr{background:var(--surface2);border-bottom:1px solid var(--border);}
  .schema-tbl th{padding:9px 14px;text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);font-weight:600;white-space:nowrap;}
  .schema-tbl tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  .schema-tbl tbody tr:last-child{border-bottom:none;}
  .schema-tbl tbody tr:hover{background:var(--surface2);}
  .schema-tbl td{padding:9px 14px;color:var(--text);vertical-align:top;}
  .col-name{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--blue);font-size:11px;white-space:nowrap;}
  .col-type{display:inline-block;background:var(--blue-lt);color:var(--blue);border:1px solid #c0d8f4;border-radius:4px;padding:1px 7px;font-size:9px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;white-space:nowrap;}
  .col-desc{color:var(--text-2);line-height:1.5;font-size:11px;}
  .col-ex{color:var(--text-3);font-size:10.5px;font-family:'JetBrains Mono',monospace;}

  /* No schema */
  .no-schema{background:var(--surface);border:1px dashed var(--border2);border-radius:9px;padding:22px;text-align:center;color:var(--text-3);font-size:11.5px;margin-bottom:24px;}
  .no-schema strong{display:block;font-size:13px;color:var(--text-2);margin-bottom:4px;}

  /* Info box */
  .info-box{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:12px 15px;font-size:11px;color:var(--text-2);line-height:1.6;display:flex;gap:10px;align-items:flex-start;}
  .info-ico{font-size:15px;flex-shrink:0;margin-top:1px;color:var(--blue);}

  /* Schema search */
  .schema-search{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:5px 10px;outline:none;width:160px;transition:border-color .2s;}
  .schema-search:focus{border-color:var(--blue);}
  .schema-search::placeholder{color:var(--text-4);}

  /* File details */
  .file-box{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-bottom:24px;box-shadow:var(--shadow);}
  .file-row{display:flex;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);font-size:11.5px;}
  .file-row:last-child{border-bottom:none;}
  .file-lbl{width:130px;flex-shrink:0;font-weight:600;color:var(--text-3);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding-top:1px;}
  .file-val{color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10.5px;word-break:break-all;}
</style>
</head>
<body>

<div class="header">
  <div class="hd-left">
    <div class="logo">L</div>
    <div>
      <div class="hd-title">Data Contracts Repository</div>
      <div class="hd-sub">Current State · Lilly Commercial Data</div>
    </div>
  </div>
  <div class="hd-right">

</div>

<div class="toolbar">

  <select class="filter-sel" id="fil-ws" onchange="applyFilters()">
    <option value="">All Workstreams</option>
  </select>
  <select class="filter-sel" id="fil-source" onchange="applyFilters()">

  <div class="tb-divider"></div>
  <div class="tb-count">Showing <strong id="shown-count">43</strong> of 43</div>
</div>

<div class="body-wrap">
  <div class="sidebar" id="sidebar"></div>
  <div class="detail" id="detail">
    <div class="detail-empty">
      <div class="ei">◎</div>
      <p>Select a data contract from the list<br>to view its schema and details</p>
    </div>
  </div>
</div>

// ── helpers ──────────────────────────────────────────────────
function typeClass(t){
  if(!t) return 'tag-default';
  const tl = t.toLowerCase();
  if(tl.includes('activity')) return 'tag-activity';
  if(tl.includes('master'))   return 'tag-master';
  if(tl.includes('output'))   return 'tag-output';
  if(tl.includes('field sug'))return 'tag-field';
  if(tl.includes('hq email') || tl.includes('hq')) return 'tag-hq';
  if(tl.includes('access'))   return 'tag-access';
  if(tl.includes('edb'))      return 'tag-edb';
  return 'tag-default';
}

function tagHTML(text, cls){ return `<span class="tag ${cls}">${text}</span>`; }

function shortType(t){
  if(!t) return 'Data Feed';
  if(t.toLowerCase().includes('field sug')) return 'Field Suggestions';
  if(t.toLowerCase().includes('hq email')) return 'HQ Email & SOA';
  return t;
}

// ── populate filter dropdowns ────────────────────────────────
function populateFilters(){
  const types   = [...new Set(CONTRACTS.map(c=>shortType(c.type)).filter(Boolean))].sort();
  const wss     = [...new Set(CONTRACTS.map(c=>c.workstream).filter(Boolean))].sort();
  const sources = [...new Set(CONTRACTS.map(c=>c.source).filter(Boolean))].sort();

  const addOpts = (selId, vals) => {
    const sel = document.getElementById(selId);
    vals.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
  };
  addOpts('fil-type',   types);
  addOpts('fil-ws',     wss);
  addOpts('fil-source', sources);
}

// ── filter ───────────────────────────────────────────────────
let filtered = [...CONTRACTS];
let selected = null;

function applyFilters(){
  const q   = document.getElementById('search-inp').value.toLowerCase();
  const typ = document.getElementById('fil-type').value;
  const ws  = document.getElementById('fil-ws').value;
  const src = document.getElementById('fil-source').value;

  filtered = CONTRACTS.filter(c=>{
    const st = shortType(c.type);
    if(typ && st !== typ) return false;
    if(ws  && c.workstream !== ws) return false;
    if(src && c.source !== src) return false;
    if(q && !c.name.toLowerCase().includes(q) &&
            !c.description.toLowerCase().includes(q) &&
            !(c.source||'').toLowerCase().includes(q) &&
            !(c.type||'').toLowerCase().includes(q)) return false;
    return true;
  });

  renderSidebar();
  document.getElementById('shown-count').textContent = filtered.length;
  document.getElementById('total-count').textContent = filtered.length;

  // reset detail if selection gone
  if(selected && !filtered.find(c=>c.sheet===selected.sheet)){
    selected=null;
    document.getElementById('detail').innerHTML = `<div class="detail-empty"><div class="ei">◎</div><p>Select a data contract from the list<br>to view its schema and details</p></div>`;
  }
}

// ── sidebar render ───────────────────────────────────────────
function renderSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = filtered.map((c,i)=>`
    <div class="contract-card${selected && selected.sheet===c.sheet?' active':''}" onclick="selectContract(${i})">
      <div class="cc-top">
        <span class="cc-id">#${c.id}</span>
      </div>
      <div class="cc-name">${c.name}</div>
      <div class="cc-tags">
        ${tagHTML(shortType(c.type), typeClass(c.type))}
        ${c.columns.length > 0 ? `${tagHTML(c.columns.length+' cols','tag-default')}` : ''}
        ${tagHTML('Active','tag-active')}
      </div>
      ${c.freq ? `<div class="cc-freq">${c.freq.slice(0,55)}</div>` : ''}
    </div>
  `).join('');
}

// ── detail render ────────────────────────────────────────────
function selectContract(idx){
  selected = filtered[idx];
  renderSidebar(); // re-render to update active state
  renderDetail(selected);
}

      <div class="dt-title">${c.name}</div>
      <div class="dt-desc">${c.description || 'No description available.'}</div>
      <div class="dt-tags">
        ${tagHTML(shortType(c.type), typeClass(c.type))}
        ${tagHTML('Active','tag-active')}
        ${tagHTML(c.workstream||'All','tag-default')}
        ${c.bu ? tagHTML(c.bu.split(',')[0].trim(),'tag-default') : ''}
      </div>

      <div class="meta-row">
        ${metaCards.map(m=>`
          <div class="meta-card">
            <div class="mc-label">${m.label}</div>
            <div class="mc-value">${m.value}</div>
          </div>`).join('')}
      </div>

      ${fileDetails.length > 0 ? `
        <div class="sec-hdr" style="margin-top:0">
          <div class="sec-title">File Details</div>
        </div>
        <div class="file-box">
          ${fileDetails.map(fd=>`
            <div class="file-row">
              <span class="file-lbl">${fd.l}</span>
              <span class="file-val">${fd.v}</span>
            </div>`).join('')}
        </div>` : ''}

      <div class="sec-hdr">
        <div class="sec-title">Schema / Column Definitions</div>
        <div style="display:flex;gap:8px;align-items:center;">
          ${schema.length > 0 ? `<input class="schema-search" placeholder="Filter columns…" oninput="filterSchema(this.value)"><span class="sec-pill">${schema.length} columns</span>` : ''}
        </div>
      </div>
      ${schemaSection}

      <div class="info-box">
        <span class="info-ico">ℹ</span>
        <span>This is a <strong>read-only</strong> repository. To update a contract or add schema columns, contact your team lead and follow the standard revision process.</span>
      </div>
    </div>`;
}

function filterSchema(q){
  const rows = document.querySelectorAll('#schema-body tr');
  rows.forEach(r=>{
    r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

// ── init ─────────────────────────────────────────────────────
populateFilters();
renderSidebar();
</script>
</body>
</html>
