<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Lilly · Data Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --lilly-red:#E1241B;
  --lilly-red-soft:#FBE4E2;
  --lilly-red-deep:#9F1A14;
  --ink:#1C1C1E;
  --ink-2:#3A3A3C;
  --muted:#6E6E73;
  --muted-2:#8E8E93;
  --bg:#FAFAFC;
  --panel:#FFFFFF;
  --panel-2:#F4F4F6;
  --border:#E5E5EA;
  --border-strong:#D1D1D6;
  --selected:#EDF2FF;
  --selected-bd:#C7D7FF;

  --b-master:#DBE7FF;       --b-master-fg:#1444A8;
  --b-feed:#F4F4F6;         --b-feed-fg:#3A3A3C;
  --b-meta:#FFF4D1;         --b-meta-fg:#7A5A00;
  --b-activity:#FFE4DC;     --b-activity-fg:#A53A22;
  --b-iris:#E5EAFF;         --b-iris-fg:#2A3F8F;
  --b-active:#DCF5E3;       --b-active-fg:#1B6B3A;
  --b-cols:#F0F0F2;         --b-cols-fg:#5C5C66;
  --b-omni:#E0F4F1;         --b-omni-fg:#0D6B5E;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:14px; line-height:1.45;
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.005em;
}
button,input,select{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
.app{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 32px; background:var(--panel);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:24px}
.brand .logo{width:78px;height:auto;flex-shrink:0;display:block}
.brand-text h1{
  font-size:24px;font-weight:700;color:var(--ink);
  letter-spacing:-0.02em;line-height:1.1;
}
.brand-text .subtitle{
  font-size:13px;color:var(--muted);margin-top:3px;
  font-weight:400;
}
.subtitle .scope-name{color:var(--ink-2);font-weight:500}

.header-meta{display:flex;align-items:center;gap:24px}
.count-display{
  display:flex;align-items:baseline;gap:6px;
}
.count-num{
  font-size:30px;font-weight:700;color:var(--lilly-red);
  line-height:1;letter-spacing:-0.03em;
  font-feature-settings:"tnum";
}
.count-label{font-size:13px;color:var(--muted);font-weight:400}
.version{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:0.06em;
  color:var(--muted);background:var(--panel-2);
  padding:6px 10px;border-radius:6px;
  border:1px solid var(--border);
}

/* FILTER BAR */
.filter-bar{
  display:flex;align-items:center;gap:14px;
  padding:14px 32px;background:var(--panel);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.search{position:relative;flex:1;min-width:240px;max-width:380px}
.search input{
  width:100%;padding:9px 14px 9px 40px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--panel);color:var(--ink);
  font-size:13px;
  transition:border-color .15s, box-shadow .15s;
}
.search input:focus{outline:none;border-color:var(--ink-2);box-shadow:0 0 0 3px rgba(28,28,30,.06)}
.search::before{
  content:"";position:absolute;left:14px;top:50%;
  transform:translateY(-50%);
  width:16px;height:16px;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236E6E73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>") no-repeat center/contain;
}

.select-wrap{position:relative}
select.fl{
  appearance:none;-webkit-appearance:none;
  padding:9px 36px 9px 14px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--panel);font-size:13px;
  cursor:pointer;color:var(--ink);
  transition:border-color .15s;
}
select.fl:hover{border-color:var(--border-strong)}
select.fl:focus{outline:none;border-color:var(--ink-2);box-shadow:0 0 0 3px rgba(28,28,30,.06)}
.select-wrap::after{
  content:"";position:absolute;right:14px;top:50%;
  transform:translateY(-50%);pointer-events:none;
  width:10px;height:10px;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236E6E73' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>") no-repeat center/contain;
}
select.scope-select{
  font-weight:600;
  border-color:var(--lilly-red);
  color:var(--lilly-red);
  background:var(--lilly-red-soft);
  padding-left:32px;
}
select.scope-select:hover{border-color:var(--lilly-red-deep);background:#F8D5D1}
.scope-wrap::before{
  content:"";position:absolute;left:12px;top:50%;
  transform:translateY(-50%);pointer-events:none;
  width:14px;height:14px;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E1241B' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='9'/><path d='M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18'/></svg>") no-repeat center/contain;
}
.scope-wrap::after{right:12px}

/* Field group with floating label (for the SCOPE dropdown only) */
.field-group{position:relative;display:flex;flex-direction:column;gap:0;flex-shrink:0}
.field-group .field-label{
  position:absolute;
  top:-7px;left:14px;
  padding:0 6px;
  background:var(--panel);
  font-size:10px;
  font-weight:700;
  letter-spacing:1.3px;
  text-transform:uppercase;
  color:var(--lilly-red);
  z-index:2;
  pointer-events:none;
  line-height:1;
  white-space:nowrap;
}
.field-group select.scope-select{padding-top:11px;padding-bottom:11px}
.scope-field .select-wrap{margin:0}

.result-count{
  margin-left:auto;color:var(--muted);font-size:13px;
  white-space:nowrap;
}
.result-count strong{color:var(--ink);font-weight:600}

/* MAIN */
.main{display:flex;flex:1;min-height:0}
.left-pane{
  width:38%;min-width:340px;max-width:440px;
  border-right:1px solid var(--border);
  background:var(--bg);
  overflow-y:auto;
  height:calc(100vh - 130px);
  padding:14px;
}
.right-pane{
  flex:1;
  background:var(--panel-2);
  overflow-y:auto;
  height:calc(100vh - 130px);
  padding:32px 40px;
}

/* CARD */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  margin-bottom:10px;
  cursor:pointer;
  transition:all .15s ease;
  position:relative;
}
.card:hover{border-color:var(--border-strong);transform:translateY(-1px);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card.selected{
  background:var(--selected);
  border-color:var(--selected-bd);
  box-shadow:0 1px 3px rgba(20,68,168,.08);
}
.card .num{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--muted-2);
  font-weight:400;letter-spacing:.02em;
}
.card .name{
  font-size:14px;font-weight:600;color:var(--ink);
  margin:3px 0 10px;line-height:1.3;
  word-break:break-word;
}
.card .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

.card-table{
  display:flex;align-items:center;gap:6px;
  margin:-6px 0 10px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;
  color:var(--muted);
  word-break:break-all;
  line-height:1.35;
}
.card-table-icon{color:var(--lilly-red);font-size:12px;line-height:1;flex-shrink:0}
.card-table-name{color:var(--ink-2);font-weight:500}
.badge{
  display:inline-flex;align-items:center;
  padding:3px 8px;border-radius:5px;
  font-size:10px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  font-family:'IBM Plex Sans',sans-serif;
  border:1px solid transparent;
}
.b-master{background:var(--b-master);color:var(--b-master-fg);border-color:#C7D8FF}
.b-feed{background:var(--b-feed);color:var(--b-feed-fg);border-color:var(--border)}
.b-meta{background:var(--b-meta);color:var(--b-meta-fg);border-color:#FFE08A}
.b-activity{background:var(--b-activity);color:var(--b-activity-fg);border-color:#FFCFC0}
.b-iris{background:var(--b-iris);color:var(--b-iris-fg);border-color:#D2DAFF}
.b-active{background:var(--b-active);color:var(--b-active-fg);border-color:#B8E4C7}
.b-cols{background:var(--b-cols);color:var(--b-cols-fg);border-color:var(--border)}
.b-omni{background:var(--b-omni);color:var(--b-omni-fg);border-color:#BFE4DD}

.card .freq{
  font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:6px;
  border-top:1px dashed var(--border);
  padding-top:9px;margin-top:2px;
}
.card .freq svg{flex-shrink:0;color:var(--muted-2)}
.card .freq-text{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* DETAIL VIEW */
.empty-state{
  display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--muted);font-size:14px;
}

.breadcrumb{
  font-size:11px;font-weight:600;
  color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;
}
.breadcrumb .sep{color:var(--border-strong)}

.detail-title{
  font-size:32px;font-weight:700;color:var(--ink);
  letter-spacing:-0.025em;line-height:1.15;
  margin-bottom:12px;
}
.detail-desc{
  font-size:15px;color:var(--ink-2);
  line-height:1.55;max-width:780px;
  margin-bottom:18px;
}
.detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.detail-tags .badge{padding:4px 10px;font-size:10.5px}

.state-toggle{
  display:inline-flex;background:var(--panel);
  border:1px solid var(--border);
  border-radius:8px;padding:3px;
  margin-bottom:24px;
}
.state-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:6px;
  font-size:11.5px;font-weight:700;
  color:var(--muted);letter-spacing:.06em;
  text-transform:uppercase;
  transition:all .15s;
  background:transparent;
}
.state-btn .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--border-strong);
}
.state-btn:hover{color:var(--ink-2)}
.state-btn.active{
  background:var(--lilly-red);color:#fff;
}
.state-btn.active .dot{background:#fff}
.state-btn:disabled{opacity:.4;cursor:not-allowed}

/* META GRID */
.meta-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;margin-bottom:32px;
}
.meta-cell{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
}
.meta-label{
  font-size:10.5px;font-weight:600;
  color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:8px;
}
.meta-value{
  font-size:15px;color:var(--ink);
  font-weight:500;line-height:1.3;
  word-break:break-word;
}
.meta-value.muted{color:var(--muted-2);font-weight:400}
.meta-value.mono{
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;font-weight:400;
}

/* SECTION */
.section{margin-bottom:28px}
.section-title{
  font-size:11px;font-weight:700;color:var(--ink);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:14px;
  display:flex;align-items:center;gap:9px;
}
.section-title::before{
  content:"";display:block;width:3px;height:13px;
  background:var(--lilly-red);border-radius:1.5px;
}

.kv-grid{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}
.kv-row{
  display:grid;
  grid-template-columns:200px 1fr;
  border-bottom:1px solid var(--border);
}
.kv-row:last-child{border-bottom:none}
.kv-key{
  padding:14px 18px;
  background:var(--panel-2);
  font-size:11px;font-weight:600;
  color:var(--muted);letter-spacing:.06em;
  text-transform:uppercase;
  border-right:1px solid var(--border);
}
.kv-val{
  padding:14px 18px;
  font-size:13.5px;color:var(--ink);
  word-break:break-word;
  font-weight:400;
}
.kv-val.mono{
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
}
.kv-val.muted{color:var(--muted-2);font-style:italic}

.zone-pill{
  display:inline-flex;align-items:center;
  padding:3px 10px;
  border-radius:6px;
  background:var(--lilly-red-soft);
  color:var(--lilly-red);
  font-family:'IBM Plex Mono',monospace;
  font-size:11.5px;font-weight:600;
  letter-spacing:.04em;
  border:1px solid rgba(225,36,27,0.18);
}

/* COLUMNS TABLE */
.cols-table{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}
.cols-table table{width:100%;border-collapse:collapse}
.cols-table th{
  background:var(--panel-2);
  padding:11px 14px;
  font-size:10.5px;font-weight:700;
  color:var(--muted);letter-spacing:.07em;
  text-transform:uppercase;text-align:left;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.cols-table td{
  padding:12px 14px;
  font-size:12.5px;color:var(--ink-2);
  border-bottom:1px solid var(--border);
  vertical-align:top;
  word-break:break-word;
}
.cols-table tr:last-child td{border-bottom:none}
.cols-table tr:hover td{background:#FBFBFD}
.cols-table .col-name{
  font-family:'IBM Plex Mono',monospace;
  font-weight:500;color:var(--ink);
  font-size:12px;
  white-space:nowrap;
}
.cols-table .col-type{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--lilly-red-deep);
  font-weight:500;
}

.no-cols{
  padding:32px;text-align:center;
  color:var(--muted);font-size:13px;
  background:var(--panel);
  border:1px dashed var(--border);
  border-radius:10px;
}

/* Scrollbar */
.left-pane::-webkit-scrollbar,.right-pane::-webkit-scrollbar{width:8px}
.left-pane::-webkit-scrollbar-thumb,.right-pane::-webkit-scrollbar-thumb{
  background:var(--border-strong);border-radius:4px;
}
.left-pane::-webkit-scrollbar-thumb:hover,.right-pane::-webkit-scrollbar-thumb:hover{background:var(--muted-2)}
.left-pane::-webkit-scrollbar-track,.right-pane::-webkit-scrollbar-track{background:transparent}

/* Empty filter result */
.no-results{
  text-align:center;padding:48px 16px;
  color:var(--muted);font-size:13px;
}
.no-results .lg{font-size:18px;color:var(--ink-2);margin-bottom:8px;font-weight:500}

/* Long content fields */
.long-text{white-space:pre-wrap;line-height:1.5}

@media (max-width:1100px){
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .kv-row{grid-template-columns:160px 1fr}
}
@media (max-width:900px){
  .left-pane{max-width:none;width:100%;height:auto;max-height:50vh;border-right:none;border-bottom:1px solid var(--border)}
  .main{flex-direction:column}
  .right-pane{height:auto}
  .meta-grid{grid-template-columns:1fr}
}
</style>
</head>

</header>

<div class="filter-bar">
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search by name, table, source...">
  </div>
  <div class="select-wrap">
    <select id="typeFilter" class="fl"><option value="">All Types</option></select>
  </div>
  <div class="select-wrap">
    <select id="locFilter" class="fl"><option value="">All Locations</option></select>

  scope:"currentState",
  search:"",
  typeFilter:"",
  locFilter:"",
  wsFilter:"",
  selectedId:null,
  detailMode:"current"

// === HELPERS ===
function getSourceLocation(item){
  // Derive a short location from the full S3 path or location text
  const loc = (item.loc||"").trim();
  if(!loc) return "—";
  if(/aws-a01.*-p-/.test(loc)) return "AWS S3 (Prod)";
  if(/aws-a01.*-s-/.test(loc)) return "AWS S3 (Stage)";
  if(/sft\.lilly\.com/.test(loc)) return "Lilly SFTP";
  if(/SFTP/i.test(loc)) return "SFTP";
  if(/Veeva object/i.test(loc)) return "Veeva";
  if(/TBD/i.test(loc) || /N\/A/i.test(loc)) return "TBD";
  if(/Lilly bucket/i.test(loc)) return "Lilly Bucket";
  if(/SFMC/i.test(loc)) return "SFMC";
  // first 36 chars
  return loc.length > 38 ? loc.substring(0,38) + "…" : loc;
}

function getSourceSystem(item){
  // Extract source system from various fields
  if(item.source) return item.source;
  const fn=(item.fileName||"").toLowerCase();
  const nm=(item.name||"").toLowerCase();
  if(fn.includes("veeva")||nm.includes("veeva")||nm.includes("vod__c"))return"Veeva";
  if(nm.includes("sfmc")||nm.includes("brand-sent"))return"SFMC";
  if(nm.includes("verso"))return"VERSO";
  if(nm.includes("medscape"))return"Medscape";
  if(nm.includes("apims"))return"APIMS";
  if(nm.includes("iris"))return"IRIS";
  if(nm.includes("gccp"))return"GCCP";
  if(nm.includes("edb"))return"EDB";
  return"Lilly";
}

function getWorkstream(item){
  const ws = item.workstream || "";
  if(ws && ws !== "OMNICHANNEL") return ws;
  return "Omnichannel";
}

function getLoadType(item){
  const l=(item.load||"").toLowerCase();
  if(!l)return"—";
  if(l.includes("delta"))return"Delta";
  if(l.includes("full"))return"Full";
  return item.load.length > 24 ? item.load.substring(0,24)+"…" : item.load;
}

function getStorageZone(item){
  // Prefer the explicit storedIn field if present (from user's data contract spec)
  const si=(item.storedIn||"").toUpperCase();
  if(si.includes("IRIS"))return"IRIS";
  if(si.includes("SFMC"))return"SFMC DE";
  if(si==="S3"||si.includes("BUCKET"))return"S3";
  // Fallback: infer from location string
  const loc=(item.loc||"").toLowerCase();
  if(loc.includes("s3://")||loc.includes("aws-"))return"S3";
  if(loc.includes("iris"))return"IRIS";
  if(loc.includes("zaidyn"))return"ZAIDYN";
  if(loc.includes("verso"))return"VERSO";
  if(loc.includes("sfmc"))return"SFMC DE";
  if(loc.includes("veeva"))return"VEEVA";
  return"IRIS";
}

function badgeClass(type){
  const t=(type||"").toUpperCase();
  if(t.includes("MASTER"))return"b-master";
  if(t.includes("METADATA"))return"b-meta";
  if(t.includes("ACTIVITY"))return"b-activity";
  return"b-feed";
}

function escapeHtml(s){
  if(s==null)return"";
  return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// === FILTERS ===
function getCurrentItems(){return DATA[state.scope]||[]}

function applyFilters(items){
  const s=state.search.toLowerCase().trim();
  return items.filter(item=>{
    if(state.typeFilter && item.type!==state.typeFilter)return false;
    if(state.locFilter){
      const sz=getStorageZone(item);
      if(sz!==state.locFilter)return false;
    }
    if(state.wsFilter && getWorkstream(item)!==state.wsFilter)return false;
    if(s){
      const blob=[item.name,item.fileName,item.desc,item.source,getSourceSystem(item),item.poc,item.owner,item.loc,item.bu,item.dept,getWorkstream(item),item.tableName,item.storedIn].join(" ").toLowerCase();
      if(!blob.includes(s))return false;
    }
    return true;
  });
}

function refreshFilterDropdowns(){
  const items=getCurrentItems();
  // Types
  const types=[...new Set(items.map(i=>i.type).filter(Boolean))].sort();
  const typeSel=document.getElementById("typeFilter");
  typeSel.innerHTML='<option value="">All Types</option>'+types.map(t=>`<option value="${escapeHtml(t)}"${state.typeFilter===t?" selected":""}>${escapeHtml(t)}</option>`).join("");
  // Locations (storage zones)
  const locs=[...new Set(items.map(i=>getStorageZone(i)).filter(Boolean))].sort();
  const locSel=document.getElementById("locFilter");
  locSel.innerHTML='<option value="">All Locations</option>'+locs.map(t=>`<option value="${escapeHtml(t)}"${state.locFilter===t?" selected":""}>${escapeHtml(t)}</option>`).join("");
  // Workstreams
  const wss=[...new Set(items.map(i=>getWorkstream(i)).filter(Boolean))].sort();
  const wsSel=document.getElementById("wsFilter");
  wsSel.innerHTML='<option value="">All Workstreams</option>'+wss.map(t=>`<option value="${escapeHtml(t)}"${state.wsFilter===t?" selected":""}>${escapeHtml(t)}</option>`).join("");
}

// === RENDER ===
function renderCards(){
  const items=getCurrentItems();
  const filtered=applyFilters(items);
  const list=document.getElementById("cardList");
  document.getElementById("totalCount").textContent=items.length;
  document.getElementById("totalCount2").textContent=items.length;
  document.getElementById("visibleCount").textContent=filtered.length;
  document.getElementById("scopeName").textContent=SCOPE_CONFIG[state.scope].label;

  if(filtered.length===0){
    list.innerHTML=`<div class="no-results"><div class="lg">No matching contracts</div>Try adjusting your filters or search</div>`;
    return;
  }

  list.innerHTML=filtered.map((item,i)=>{
    const sel=item.id===state.selectedId?" selected":"";
    const sys=getSourceSystem(item);
    const sysBadge=`<span class="badge b-iris">${escapeHtml(sys)}</span>`;
    const typeBadge=`<span class="badge ${badgeClass(item.type)}">${escapeHtml(item.type)}</span>`;
    const colsBadge=`<span class="badge b-cols">${item.colCount} COLS</span>`;
    const statusBadge=`<span class="badge b-active">${escapeHtml(item.status)}</span>`;
    const freq=item.freq?escapeHtml(item.freq):"ad-hoc";
    const tn = item.tableName||"";
    const isS3 = (item.storedIn||"").toUpperCase().includes("S3") || tn.startsWith("s3:");
    const tnDisplay = isS3 ? (tn.length > 48 ? tn.substring(0,45)+"…" : tn) : tn;
    const tableLine = tn ? `<div class="card-table"><span class="card-table-icon">${isS3?"☁":"⌨"}</span><span class="card-table-name">${escapeHtml(tnDisplay)}</span></div>` : "";
    // Extract trailing number from id like "currentState_3" → 3, fall back to position
    const seqMatch = String(item.id).match(/_(\d+)$/);
    const seq = seqMatch ? seqMatch[1] : (i+1);
    return `<div class="card${sel}" data-id="${item.id}">
      <div class="num">#${seq}</div>
      <div class="name">${escapeHtml(item.name)}</div>
      ${tableLine}
      <div class="badges">${typeBadge}${sysBadge}${colsBadge}${statusBadge}</div>
      <div class="freq">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span class="freq-text">${freq}</span>
      </div>
    </div>`;
  }).join("");

  list.querySelectorAll(".card").forEach(c=>{
    c.addEventListener("click",()=>{
      state.selectedId=c.dataset.id;
      state.detailMode="current";
      renderCards();
      renderDetail();
    });
  });
}

function getMatchedFutureForCurrent(item){
  // Find a future state entry that matches this current state entry by name
  const fs = DATA.futureState||[];
  return fs.find(f => f.currentName === item.name) || null;
}

function getMatchedCurrentForFuture(item){
  const cs = DATA.currentState||[];
  return cs.find(c => c.name === item.currentName) || null;
}

    const cur = getMatchedCurrentForFuture(item);

    btn.addEventListener("click",()=>{
      if(btn.disabled)return;
      state.detailMode = btn.dataset.mode;
      renderDetail();
    });
  });

  // Scroll to top of right pane on selection change
  view.scrollTop = 0;
}

// === EVENTS ===
document.getElementById("scopeSelect").addEventListener("change",e=>{
  state.scope = e.target.value;
  state.selectedId = null;
  state.search = "";
  state.typeFilter = "";
  state.locFilter = "";
  state.wsFilter = "";
  state.detailMode = state.scope==="futureState" ? "future" : "current";
  document.getElementById("searchInput").value = "";
  refreshFilterDropdowns();
  renderCards();
  renderDetail();
});

document.getElementById("searchInput").addEventListener("input",e=>{
  state.search = e.target.value;
  renderCards();
});
document.getElementById("typeFilter").addEventListener("change",e=>{state.typeFilter=e.target.value;renderCards()});
document.getElementById("locFilter").addEventListener("change",e=>{state.locFilter=e.target.value;renderCards()});
document.getElementById("wsFilter").addEventListener("change",e=>{state.wsFilter=e.target.value;renderCards()});

// === INIT ===
refreshFilterDropdowns();
// Pre-select first item
const initItems = getCurrentItems();
if(initItems.length > 0) state.selectedId = initItems[0].id;
renderCards();
renderDetail();
</script>
</body>
</html>
